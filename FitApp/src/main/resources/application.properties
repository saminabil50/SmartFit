spring.application.name=FitApp

spring.datasource.url=jdbc:mysql://localhost:3306/fitApp
spring.datasource.username=root
spring.datasource.password=1234578
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT (override JWT_SECRET env var in production)
app.jwt.secret=${JWT_SECRET:change_this_secret_in_production_min_32_chars_long}
app.jwt.expiration-ms=604800000

# Show error messages in response body
server.error.include-message=always

# snake_case JSON for all endpoints
spring.jackson.property-naming-strategy=SNAKE_CASE

# Multipart file upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Local uploads directory (relative to working directory)
app.uploads.dir=uploads

# Optional one-time local bootstrap: set APP_ADMIN_EMAIL to an existing user email.
app.admin.email=${APP_ADMIN_EMAIL:}
